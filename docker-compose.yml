services:

  ollama:
    image: ollama/ollama
    container_name: docmind-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # ── NVIDIA GPU (RTX 3050 6 GB) ───────────────────────────────────────────
    # Requires: NVIDIA Container Toolkit installed on the host.
    # Windows: enable in Docker Desktop → Settings → Resources → GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    build: .
    container_name: docmind-app
    ports:
      - "8501:8501"
    volumes:
      - ./.cache:/app/.cache
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
