services:

  ollama:
    image: ollama/ollama
    container_name: docmind-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  backend:
    build: ./backend
    container_name: docmind-backend
    ports:
      - "8000:8000"
    volumes:
      - ./.cache:/app/.cache
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CACHE_DIR=/app/.cache
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: docmind-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
